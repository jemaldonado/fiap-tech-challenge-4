global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'api-lstm-monitor'

scrape_configs:
  - job_name: 'api-lstm'
    scheme: https
    static_configs:
      - targets: ['api-lstm.onrender.com']
    metrics_path: '/metrics'
    scrape_interval: 15s
    scrape_timeout: 10s
